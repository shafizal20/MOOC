<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic 1: Introduction to Marketing Research</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 26px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 25px;
      color: #6b7280;
      font-size: 14px;
    }

    .question {
      margin-bottom: 20px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fafafa;
    }

    .question h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    label {
      display: block;
      margin: 6px 0;
      cursor: pointer;
      font-size: 14px;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      display: none;
    }

    .excellent { background: #dcfce7; color: #166534; }
    .good { background: #dbeafe; color: #1e40af; }
    .pass { background: #fef9c3; color: #854d0e; }
    .fail { background: #fee2e2; color: #991b1b; }

    .feedback {
      margin-top: 8px;
      font-size: 13px;
    }

    .correct { color: #16a34a; font-weight: 600; }
    .wrong { color: #dc2626; font-weight: 600; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Topic 1: Introduction to Marketing Research</h1>
    <div class="subtitle">Answer all questions before submitting</div>

    <form id="quizForm"></form>

    <button type="button" onclick="submitQuiz()">Submit</button>

    <div id="resultBox" class="result"></div>
  </div>

<script>
const quizData = [
  {
    question: "1. What are the important characteristics of a marketing research?",
    options: ["A) i & ii", "B) ii & iii", "C) i, ii & iii", "D) i, ii, iii & iv"],
    answer: 3
  },
  {
    question: "2. Marketing research is important for marketing and other functional managers.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    question: "3. Marketing research is related to marketing mix, customers, environment and decisions.",
    options: ["Yes", "No"],
    answer: 0
  },
  {
    question: "4. Which is NOT part of marketing environment (external factors)?",
    options: ["Economy", "Product", "Social & cultural", "Technology"],
    answer: 1
  },
  {
    question: "5. Which is NOT a hallmark of scientific marketing research?",
    options: ["Parsimonious", "Cheap", "Objective", "Rigorous"],
    answer: 1
  },
  {
    question: "6. There are ____ major steps in marketing research process.",
    options: ["4", "5", "6", "7"],
    answer: 2
  },
  {
    question: "7. Most important step in marketing research process is:",
    options: ["Reporting", "Data analysis", "Problem definition", "Research design"],
    answer: 2
  },
  {
    question: "8. Arrange research steps in correct sequence.",
    options: [
      "i, ii, iii, iv, v, vi",
      "i, ii, iv, vi, v, iii",
      "i, iii, ii, iv, v, vi",
      "v, iv, vi, i, ii, iii"
    ],
    answer: 1
  }
];

const quizForm = document.getElementById("quizForm");

function loadQuiz() {
  quizForm.innerHTML = "";

  quizData.forEach((q, index) => {
    const div = document.createElement("div");
    div.className = "question";

    let html = `<h3>${q.question}</h3>`;

    q.options.forEach((opt, i) => {
      html += `
        <label>
          <input type="radio" name="q${index}" value="${i}">
          ${opt}
        </label>
      `;
    });

    html += `<div class="feedback" id="fb${index}"></div>`;
    div.innerHTML = html;
    quizForm.appendChild(div);
  });
}

function submitQuiz() {
  let score = 0;
  let allAnswered = true;

  quizData.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const fb = document.getElementById(`fb${i}`);

    if (!selected) {
      allAnswered = false;
      fb.innerHTML = `<span class="wrong">Please answer this question</span>`;
    } else {
      if (parseInt(selected.value) === q.answer) {
        score++;
        fb.innerHTML = `<span class="correct">Correct ✓</span>`;
      } else {
        fb.innerHTML = `<span class="wrong">Incorrect ✗</span>`;
      }
    }
  });

  if (!allAnswered) {
    alert("Please answer ALL questions before submitting.");
    return;
  }

  const resultBox = document.getElementById("resultBox");
  resultBox.style.display = "block";

  const percent = (score / quizData.length) * 100;

  let gradeText = "";
  let className = "";

  if (percent >= 80) {
    gradeText = "Excellent Performance";
    className = "excellent";
  } else if (percent >= 60) {
    gradeText = "Good Performance";
    className = "good";
  } else if (percent >= 50) {
    gradeText = "Pass";
    className = "pass";
  } else {
    gradeText = "Needs Improvement";
    className = "fail";
  }

  resultBox.className = "result " + className;
  resultBox.innerHTML =
    `Score: ${score} / ${quizData.length}<br>${gradeText}`;

  // LMS PROGRESS SAVE
  let completed = JSON.parse(localStorage.getItem("completedTopics")) || [];

  if (!completed.includes("topic1")) {
    completed.push("topic1");
  }

  localStorage.setItem("completedTopics", JSON.stringify(completed));
}

loadQuiz();
</script>

</body>
</html>
