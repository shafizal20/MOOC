<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Marketing Research Quiz · Topic 12: Marketing Metrics and Its Application</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f2f5f9;
      padding: 24px 16px;
    }

    .quiz-box {
      max-width: 950px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 24px 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0a2b44;
      text-align: center;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      color: #4a627a;
      font-size: 0.85rem;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e9edf2;
    }

    .question {
      background: #ffffff;
      border: 1px solid #e9edf2;
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 18px;
      transition: all 0.2s;
    }

    .question.correct-bg {
      background: #f0fdf4;
      border-left: 5px solid #22c55e;
    }

    .question.wrong-bg {
      background: #fef2f2;
      border-left: 5px solid #ef4444;
    }

    .q-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .q-num {
      background: #e9edf2;
      padding: 3px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a3e60;
    }

    .q-text {
      font-size: 1rem;
      font-weight: 600;
      color: #0f2b3d;
      line-height: 1.5;
      flex: 1;
    }

    .extra-list {
      margin: 10px 0 12px 24px;
      font-size: 0.92rem;
      font-weight: normal;
      color: #2c4c6e;
    }

    .extra-list li {
      margin: 5px 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #fafcff;
      border: 1px solid #e4e9f0;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #f0f5ff;
    }

    input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .feedback {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .feedback-correct {
      background: #dcfce7;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .feedback-wrong {
      background: #fee2e2;
      color: #991b1b;
      border-left: 3px solid #ef4444;
    }

    .feedback-missing {
      background: #fff1e6;
      color: #9a3412;
      border-left: 3px solid #f97316;
    }

    .btn-submit {
      background: #1e4a8a;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #0f3a6e;
    }

    .btn-submit:disabled {
      background: #9bb5d0;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .score-area {
      text-align: center;
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      margin-top: 8px;
      border: 1px solid #e9edf2;
    }

    .score-number {
      font-size: 2rem;
      font-weight: 800;
      color: #0a2b44;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .result-icon {
      font-size: 2rem;
    }

    .perfect-badge {
      margin-top: 8px;
      background: linear-gradient(135deg, #f5b042, #f0a500);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
    }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #7c8ea0;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="quiz-box">
  <h1>📊 Topic 12: Marketing Metrics and Its Application</h1>
  <div class="sub">Cost Per Lead · CAC · CLV · SEO · Social Media Engagement · ROI — 10 MCQs + 5 Quiz Questions</div>
  <div id="questionsContainer"></div>
  <button id="submitBtn" class="btn-submit">✓ Submit & Grade</button>
  <div id="scorePanel" style="display:none;"></div>
  <footer>CPL · CAC · CLV · SEO Rankings · Social Media & Mobile Traffic · Return on Investment (ROI)</footer>
</div>

<script>
// --------------------------------------------------------------
// QUIZ DATA for TOPIC 12: Marketing Metrics and Its Application
// Total 15 questions: 10 MCQs + 5 "quiz" style (short scenario/true-false)
// Based strictly on the provided PDF content (Marketing Metrics)
// --------------------------------------------------------------
const quizData = [
  // ---- 10 MCQs ----
  {
    id: 1,
    text: "What does CPL stand for in marketing metrics?",
    options: ["A) Cost Per Lifetime", "B) Customer Profit Loss", "C) Cost Per Lead", "D) Campaign Performance Link"],
    answer: 2,  // C) Cost Per Lead
    listBefore: false
  },
  {
    id: 2,
    text: "Which metric is calculated by dividing total sales and marketing costs by the number of new customers acquired?",
    options: ["A) CPL", "B) CLV", "C) ROI", "D) CAC"],
    answer: 3,  // D) CAC
    listBefore: false
  },
  {
    id: 3,
    text: "According to the document, what is the ideal LTV:CAC ratio for a healthy, sustainable business?",
    options: ["A) 1:1", "B) 2:1", "C) 3:1 or higher", "D) 5:1 or higher"],
    answer: 2,  // C) 3:1 or higher
    listBefore: false
  },
  {
    id: 4,
    text: "Which of the following is NOT listed as a factor influencing SEO rankings?",
    options: ["A) Backlinks", "B) Social media followers count", "C) Site speed", "D) Keyword optimization"],
    answer: 1,  // B) Social media followers
    listBefore: false
  },
  {
    id: 5,
    text: "What does the CAC Payback Period measure?",
    options: ["A) Time to recover customer acquisition cost", "B) Time to rank on Google's first page", "C) Time to generate one lead", "D) Time to double social media engagement"],
    answer: 0,  // A) Time to recover customer acquisition cost
    listBefore: false
  },
  {
    id: 6,
    text: "Which metric helps determine how much a company can afford to spend to acquire a new customer (setting the CAC threshold)?",
    options: ["A) ROI", "B) CPL", "C) CLV", "D) Mobile traffic rate"],
    answer: 2,  // C) CLV
    listBefore: false
  },
  {
    id: 7,
    text: "What is the correct ROI formula according to the document?",
    options: ["A) (Revenue / Cost) × 100", "B) (Net Profit / Cost of Investment) × 100", "C) (Leads Generated / Cost) × 100", "D) (CLV / CAC) × 100"],
    answer: 1,  // B) (Net Profit / Cost of Investment) × 100
    listBefore: false
  },
  {
    id: 8,
    text: "Which of the following is explicitly included in Customer Acquisition Cost (CAC) as per the document?",
    options: ["A) Only advertising spend on Google", "B) Salaries and commissions for sales and marketing teams", "C) Product manufacturing cost", "D) Customer support cost after acquisition"],
    answer: 1,  // B) Salaries + commissions
    listBefore: false
  },
  {
    id: 9,
    text: "When is a high CPL considered acceptable?",
    options: ["A) When the campaign goes viral", "B) If those leads convert into high-paying customers", "C) Only when CPL is lower than industry average", "D) Never, high CPL always indicates failure"],
    answer: 1,  // B) if leads convert into high-paying customers
    listBefore: false
  },
  {
    id: 10,
    text: "Which formula correctly represents Customer Lifetime Value (CLV) in revenue terms (simple version from the document)?",
    options: ["A) Average Purchase Value × Purchase Frequency × Customer Lifespan", "B) Total Sales / Number of Customers", "C) (Net Profit / Cost) × 100", "D) Total Campaign Cost / Number of Leads"],
    answer: 0,  // APV x PF x Lifespan
    listBefore: false
  },
  // ---- 5 short "quiz" style questions (concept & application) ----
  {
    id: 11,
    text: "True or False: A lower CPL always guarantees better profitability, regardless of lead quality.",
    options: ["True", "False"],
    answer: 1,  // False
    listBefore: false
  },
  {
    id: 12,
    text: "Fill-in concept: The component of CLV that represents how often a customer buys in a given period is called _______.",
    options: ["A) Average Purchase Value", "B) Purchase Frequency", "C) Gross Margin", "D) Customer Churn"],
    answer: 1,  // B) Purchase Frequency
    listBefore: false
  },
  {
    id: 13,
    text: "According to the document, how does social media engagement drive mobile traffic?",
    options: ["A) By increasing paid ad budget", "B) By signaling algorithms that content is valuable → boosting organic reach → driving more mobile users", "C) By reducing website loading time automatically", "D) By directly increasing email subscribers"],
    answer: 1,  // B) algorithmic boost & organic reach
    listBefore: false
  },
  {
    id: 14,
    text: "Which of the following statements about ROI is TRUE based on the text?",
    options: ["A) ROI accounts perfectly for the time value of money", "B) A higher ROI always means better performance and works well for comparing investments of different durations", "C) ROI doesn't account for the time it takes to generate returns, making comparisons tricky for investments of different durations", "D) ROI is calculated as (Gross Profit / Number of Leads) × 100"],
    answer: 2,  // C) limitation about time
    listBefore: false
  },
  {
    id: 15,
    text: "Which metric directly helps a business decide budget allocation between retention marketing (loyalty programs) vs. acquiring new customers?",
    options: ["A) Cost Per Lead (CPL)", "B) Social Media Engagement Rate", "C) Customer Lifetime Value (CLV)", "D) Search Engine Rankings"],
    answer: 2,  // CLV — document page 10: "Helps marketers decide how much budget to spend on retaining existing customers versus buying new ads"
    listBefore: false
  }
];

let selections = new Array(quizData.length).fill(-1);
let submitted = false;
let confettiTriggered = false;

const container = document.getElementById("questionsContainer");
const submitBtn = document.getElementById("submitBtn");
const scorePanel = document.getElementById("scorePanel");

// lightweight confetti celebration (same style)
function startConfetti() {
  if (confettiTriggered) return;
  confettiTriggered = true;

  const colors = ["#f44336", "#e91e63", "#9c27b0", "#3f51b5", "#2196f3", "#00bcd4", "#4caf50", "#ffeb3b", "#ff9800", "#ff5722"];
  const confettiCount = 150;
  const containerEl = document.body;

  for (let i = 0; i < confettiCount; i++) {
    const conf = document.createElement("div");
    const size = Math.floor(Math.random() * 12 + 6);
    const color = colors[Math.floor(Math.random() * colors.length)];
    conf.style.position = "fixed";
    conf.style.width = size + "px";
    conf.style.height = size + "px";
    conf.style.backgroundColor = color;
    conf.style.top = "-20px";
    conf.style.left = Math.random() * window.innerWidth + "px";
    conf.style.opacity = "0.9";
    conf.style.borderRadius = Math.random() > 0.7 ? "50%" : "2px";
    conf.style.pointerEvents = "none";
    conf.style.zIndex = "9999";
    conf.style.boxShadow = "0 2px 5px rgba(0,0,0,0.2)";
    containerEl.appendChild(conf);

    const duration = 1500 + Math.random() * 1500;
    const destination = window.innerHeight + 50;
    const rotate = Math.random() * 360;
    conf.style.transition = `transform ${duration}ms cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity ${duration * 0.8}ms ease-out`;
    requestAnimationFrame(() => {
      conf.style.transform = `translateY(${destination}px) rotate(${rotate}deg)`;
      conf.style.opacity = "0";
    });

    setTimeout(() => {
      if (conf && conf.remove) conf.remove();
    }, duration + 200);
  }

  setTimeout(() => {
    confettiTriggered = false;
  }, 2800);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

function formatTextWithLineBreaks(text) {
  if (!text) return '';
  return text.split('\n').map(line => line.trim()).filter(line => line).join('<br>');
}

function renderQuestions() {
  let html = "";
  for (let i = 0; i < quizData.length; i++) {
    const q = quizData[i];
    const selectedVal = selections[i];
    let questionClass = "question";

    if (submitted) {
      const isCorrect = (selectedVal !== -1 && selectedVal === q.answer);
      questionClass += isCorrect ? " correct-bg" : " wrong-bg";
    }

    html += `<div class="${questionClass}"><div class="q-header"><span class="q-num">${q.id}</span><div class="q-text">`;
    html += `<div>${formatTextWithLineBreaks(escapeHtml(q.text))}</div>`;

    if (q.listBefore && q.listItems && q.listItems.length) {
      html += `<div class="extra-list"><ul>`;
      q.listItems.forEach(li => {
        html += `<li>${escapeHtml(li)}</li>`;
      });
      html += `</ul></div>`;
    }

    html += `</div></div><div class="options">`;

    q.options.forEach((opt, idx) => {
      html += `<label class="option">
        <input type="radio" name="q${i}" value="${idx}" ${selectedVal === idx ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        <span>${escapeHtml(opt)}</span>
      </label>`;
    });

    html += `</div>`;

    if (submitted) {
      if (selectedVal === -1) {
        html += `<div class="feedback feedback-missing">⚠️ Not answered · Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else if (selectedVal !== q.answer) {
        html += `<div class="feedback feedback-wrong">❌ Incorrect · Your answer: ${escapeHtml(q.options[selectedVal])}<br>✅ Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else {
        html += `<div class="feedback feedback-correct">✓ Correct</div>`;
      }
    }
    html += `</div>`;
  }

  container.innerHTML = html;

  if (!submitted) {
    for (let i = 0; i < quizData.length; i++) {
      const radios = document.querySelectorAll(`input[name="q${i}"]`);
      radios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          if (!submitted) {
            selections[i] = parseInt(e.target.value);
            renderQuestions(); // re-render to keep consistent UI
          }
        });
      });
    }
  }
}

function getScore() {
  let correct = 0;
  for (let i = 0; i < quizData.length; i++) {
    if (selections[i] !== -1 && selections[i] === quizData[i].answer) correct++;
  }
  return correct;
}

function getResultIcon(correct, total, isPerfect) {
  const percent = (correct / total) * 100;
  if (isPerfect) return { icon: "🏅", label: "PERFECT MASTERY" };
  if (percent >= 80) return { icon: "🏆", label: "EXCELLENT" };
  if (percent >= 60) return { icon: "🎓", label: "GOOD" };
  if (percent >= 50) return { icon: "📘", label: "PASS" };
  return { icon: "📚", label: "NEEDS REVIEW" };
}

function handleSubmit() {
  if (submitted) return;

  const answeredCount = selections.filter(s => s !== -1).length;
  if (answeredCount < quizData.length && !confirm(`You answered ${answeredCount} out of ${quizData.length}. Submit anyway?`)) {
    return;
  }

  submitted = true;
  const correct = getScore();
  const total = quizData.length;
  const isPerfect = correct === total;

  renderQuestions();

  const percent = (correct / total) * 100;
  let message = isPerfect
    ? "Flawless! You've mastered Marketing Metrics — CPL, CAC, CLV, SEO, ROI and beyond. 🌟"
    : percent >= 80
      ? "Excellent! Strong grasp of marketing metrics. Review flagged answers to polish further. 🎉"
      : percent >= 60
        ? "Good job! Core metrics understood; revisit CPL vs CAC & CLV applications."
        : percent >= 50
          ? "Pass. Review the applications of LTV:CAC ratio and ROI formula to strengthen."
          : "Needs improvement. Re-read sections on acquisition cost, lifetime value, and SEO drivers.";

  const { icon, label } = getResultIcon(correct, total, isPerfect);

  scorePanel.style.display = "block";
  scorePanel.innerHTML = `
    <div class="score-area">
      <div class="score-number">
        <span class="result-icon">${icon}</span>
        <span>${correct} / ${total}</span>
      </div>
      <div style="margin-top:6px; font-size:0.9rem; font-weight:600; color:#1e4a8a;">${label}</div>
      <div style="margin-top:8px; font-size:0.85rem; color:#2c5a6e;">${message}</div>
      ${isPerfect ? '<div class="perfect-badge">✨ PERFECT SCORE! ✨<br>📊 Confetti celebration! 🎉</div>' : ''}
    </div>
  `;

  if (isPerfect) startConfetti();
  submitBtn.disabled = true;
}

submitBtn.addEventListener("click", handleSubmit);
renderQuestions();
</script>
</body>
</html>
