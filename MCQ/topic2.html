<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Marketing Research Quiz · Topic 2: Defining Problem & Research Objectives</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f2f5f9;
      padding: 24px 16px;
    }

    .quiz-box {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 24px 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0a2b44;
      text-align: center;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      color: #4a627a;
      font-size: 0.85rem;
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e9edf2;
    }

    .question {
      background: #ffffff;
      border: 1px solid #e9edf2;
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 18px;
      transition: all 0.2s;
    }

    .question.correct-bg {
      background: #f0fdf4;
      border-left: 5px solid #22c55e;
    }

    .question.wrong-bg {
      background: #fef2f2;
      border-left: 5px solid #ef4444;
    }

    .q-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .q-num {
      background: #e9edf2;
      padding: 3px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a3e60;
    }

    .q-text {
      font-size: 1rem;
      font-weight: 600;
      color: #0f2b3d;
      line-height: 1.5;
      flex: 1;
    }

    .extra-list {
      margin: 10px 0 12px 24px;
      font-size: 0.92rem;
      font-weight: normal;
      color: #2c4c6e;
    }

    .extra-list li {
      margin: 5px 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #fafcff;
      border: 1px solid #e4e9f0;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option:hover {
      background: #f0f5ff;
    }

    input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .feedback {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .feedback-correct {
      background: #dcfce7;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .feedback-wrong {
      background: #fee2e2;
      color: #991b1b;
      border-left: 3px solid #ef4444;
    }

    .feedback-missing {
      background: #fff1e6;
      color: #9a3412;
      border-left: 3px solid #f97316;
    }

    .btn-submit {
      background: #1e4a8a;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #0f3a6e;
    }

    .btn-submit:disabled {
      background: #9bb5d0;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .score-area {
      text-align: center;
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      margin-top: 8px;
      border: 1px solid #e9edf2;
    }

    .score-number {
      font-size: 2rem;
      font-weight: 800;
      color: #0a2b44;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .result-icon {
      font-size: 2rem;
    }

    .perfect-badge {
      margin-top: 8px;
      background: linear-gradient(135deg, #f5b042, #f0a500);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
    }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #7c8ea0;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="quiz-box">
  <h1>🎯 Topic 2: Defining Problem & Research Objectives</h1>
  <div class="sub">Questions 11–17 · problem definition · environmental context · research objectives</div>
  <div id="questionsContainer"></div>
  <button id="submitBtn" class="btn-submit">✓ Submit & Grade</button>
  <div id="scorePanel" style="display:none;"></div>
  <footer>Problem well-defined is half-solved · Marketing research process</footer>
</div>

<script>
// --------------------------------------------------------------
// QUIZ DATA for TOPIC 2: Defining Problem and Research Objectives
// Questions start at 11 through 17 exactly as provided
// --------------------------------------------------------------
const quizData = [
  {
    id: 11,
    text: "A/An ____ and ____ identified and defined problem enables a research to be properly conducted and accomplished.",
    options: [
      "A) nicely, beautifully",
      "B) clearly, accurately",
      "C) worldly, theoretically",
      "D) empirically, economically"
    ],
    answer: 1,   // B) clearly, accurately
    listBefore: false,
    listItems: null
  },
  {
    id: 12,
    text: "A good problem definition can avoid irrelevant research and reduce unnecessary monetary or non-monetary costs.",
    options: ["yes", "no"],
    answer: 0,   // yes
    listBefore: false
  },
  {
    id: 13,
    text: "Which of the following is NOT the important task in problem definition?",
    options: [
      "A) Search and review the related literature",
      "B) Discuss with the experts and decision makers",
      "C) Doing a qualitative research",
      "D) Reporting the final research"
    ],
    answer: 3,   // D) Reporting the final research
    listBefore: false
  },
  {
    id: 14,
    text: "Marketing researchers will tend to agree that 'A problem well-defined is half-solved'?",
    options: ["yes", "no"],
    answer: 0,   // yes
    listBefore: false
  },
  {
    id: 15,
    text: "The important environmental aspects which the marketing researchers will consider when defining the problem are:",
    listItems: [
      "i) Past information",
      "ii) Economic situation",
      "iii) Behaviours of the customers/individuals",
      "iv) Legal and political"
    ],
    options: [
      "A) i, ii, iii",
      "B) ii, iii, iv",
      "C) i, ii, iv",
      "D) i, ii, iii, iv"
    ],
    answer: 3,   // D) i, ii, iii, iv
    listBefore: true
  },
  {
    id: 16,
    text: "i) To determine the level of patient satisfaction. ii) To determine the patients' experience with the hospitals. iii) To identify the determinants of patient satisfaction. The above are examples of ____ problem.",
    options: [
      "A) Critical",
      "B) Research",
      "C) Management decision",
      "D) Social"
    ],
    answer: 1,   // B) Research
    listBefore: false
  },
  {
    id: 17,
    text: "It is recommendable to define problem specifically, then broadly.",
    options: ["yes", "no"],
    answer: 1,   // no
    listBefore: false
  }
];

let selections = new Array(quizData.length).fill(-1);
let submitted = false;
let confettiTriggered = false;

const container = document.getElementById("questionsContainer");
const submitBtn = document.getElementById("submitBtn");
const scorePanel = document.getElementById("scorePanel");

// ---------- lightweight confetti celebration (perfect score only) ----------
function startConfetti() {
  if (confettiTriggered) return;
  confettiTriggered = true;

  const colors = ["#f44336", "#e91e63", "#9c27b0", "#3f51b5", "#2196f3", "#00bcd4", "#4caf50", "#ffeb3b", "#ff9800", "#ff5722"];
  const confettiCount = 150;
  const containerEl = document.body;

  for (let i = 0; i < confettiCount; i++) {
    const conf = document.createElement("div");
    const size = Math.floor(Math.random() * 12 + 6);
    const color = colors[Math.floor(Math.random() * colors.length)];
    conf.style.position = "fixed";
    conf.style.width = size + "px";
    conf.style.height = size + "px";
    conf.style.backgroundColor = color;
    conf.style.top = "-20px";
    conf.style.left = Math.random() * window.innerWidth + "px";
    conf.style.opacity = "0.9";
    conf.style.borderRadius = Math.random() > 0.7 ? "50%" : "2px";
    conf.style.pointerEvents = "none";
    conf.style.zIndex = "9999";
    conf.style.boxShadow = "0 2px 5px rgba(0,0,0,0.2)";
    containerEl.appendChild(conf);

    const duration = 1500 + Math.random() * 1500;
    const destination = window.innerHeight + 50;
    const rotate = Math.random() * 360;
    conf.style.transition = `transform ${duration}ms cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity ${duration * 0.8}ms ease-out`;
    requestAnimationFrame(() => {
      conf.style.transform = `translateY(${destination}px) rotate(${rotate}deg)`;
      conf.style.opacity = "0";
    });

    setTimeout(() => {
      if (conf && conf.remove) conf.remove();
    }, duration + 200);
  }

  setTimeout(() => {
    confettiTriggered = false;
  }, 2800);
}

// escape utility
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;'
  }[m] || m));
}

// render all questions with dynamic state
function renderQuestions() {
  let html = "";
  for (let i = 0; i < quizData.length; i++) {
    const q = quizData[i];
    const selectedVal = selections[i];
    let questionClass = "question";

    if (submitted) {
      const isCorrect = (selectedVal !== -1 && selectedVal === q.answer);
      if (isCorrect) {
        questionClass += " correct-bg";
      } else {
        questionClass += " wrong-bg";
      }
    }

    html += `<div class="${questionClass}"><div class="q-header"><span class="q-num">${q.id}</span><div class="q-text">`;

    // Question text + optional list items (like in Q15)
    if (q.listBefore && q.listItems && q.listItems.length) {
      html += `<p>${escapeHtml(q.text)}</p><div class="extra-list"><ul>`;
      q.listItems.forEach(li => {
        html += `<li>${escapeHtml(li)}</li>`;
      });
      html += `</ul></div>`;
    } else {
      // For question 16 we have a longer descriptive text, keep formatting clean
      html += `<div>${escapeHtml(q.text)}</div>`;
    }

    html += `</div></div><div class="options">`;

    // render options
    q.options.forEach((opt, idx) => {
      html += `<label class="option">
        <input type="radio" name="q${i}" value="${idx}" ${selectedVal === idx ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        <span>${escapeHtml(opt)}</span>
      </label>`;
    });

    html += `</div>`;

    // feedback area after submission
    if (submitted) {
      if (selectedVal === -1) {
        html += `<div class="feedback feedback-missing">⚠️ Not answered · Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else if (selectedVal !== q.answer) {
        html += `<div class="feedback feedback-wrong">❌ Incorrect · Your answer: ${escapeHtml(q.options[selectedVal])}<br>✅ Correct: ${escapeHtml(q.options[q.answer])}</div>`;
      } else {
        html += `<div class="feedback feedback-correct">✓ Correct</div>`;
      }
    }
    html += `</div>`; // close .question
  }

  container.innerHTML = html;

  // attach change events only when quiz is not yet submitted
  if (!submitted) {
    for (let i = 0; i < quizData.length; i++) {
      const radios = document.querySelectorAll(`input[name="q${i}"]`);
      radios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          if (!submitted) {
            selections[i] = parseInt(e.target.value);
            renderQuestions(); // re-render to keep UI consistent (preserves selection style)
          }
        });
      });
    }
  }
}

// compute score (correct answers)
function getScore() {
  let correct = 0;
  for (let i = 0; i < quizData.length; i++) {
    if (selections[i] !== -1 && selections[i] === quizData[i].answer) correct++;
  }
  return correct;
}

// dynamic result icon + label
function getResultIcon(correct, total, isPerfect) {
  const percent = (correct / total) * 100;
  if (isPerfect) return { icon: "👑", label: "PERFECT MASTERY" };
  if (percent >= 80) return { icon: "🏆", label: "EXCELLENT" };
  if (percent >= 60) return { icon: "🎓", label: "GOOD" };
  if (percent >= 50) return { icon: "📘", label: "PASS" };
  return { icon: "📚", label: "NEEDS REVIEW" };
}

// main submit & grading
function handleSubmit() {
  if (submitted) return;

  const answeredCount = selections.filter(s => s !== -1).length;
  if (answeredCount < quizData.length && !confirm(`You answered ${answeredCount} out of ${quizData.length}. Submit anyway?`)) {
    return;
  }

  submitted = true;
  const correct = getScore();
  const total = quizData.length;
  const isPerfect = correct === total;

  // re-render with feedback and background colours
  renderQuestions();

  const percent = (correct / total) * 100;
  let message = isPerfect
    ? "Outstanding! Perfect score achieved! 🌟"
    : percent >= 80
      ? "Excellent! Mastery achieved. 🎉"
      : percent >= 60
        ? "Great job! Review the incorrect answers."
        : percent >= 50
          ? "Pass. Keep practicing to improve."
          : "Needs improvement. Review the questions above.";

  const { icon, label } = getResultIcon(correct, total, isPerfect);

  scorePanel.style.display = "block";
  scorePanel.innerHTML = `
    <div class="score-area">
      <div class="score-number">
        <span class="result-icon">${icon}</span>
        <span>${correct} / ${total}</span>
      </div>
      <div style="margin-top:6px; font-size:0.9rem; font-weight:600; color:#1e4a8a;">${label}</div>
      <div style="margin-top:8px; font-size:0.85rem; color:#2c5a6e;">${message}</div>
      ${isPerfect ? '<div class="perfect-badge">✨ PERFECT SCORE! ✨<br>🎉 Confetti celebration! 🎉</div>' : ''}
    </div>
  `;

  if (isPerfect) {
    startConfetti();
  }

  submitBtn.disabled = true;
}

// initialization
submitBtn.addEventListener("click", handleSubmit);
renderQuestions();
</script>
</body>
</html>
