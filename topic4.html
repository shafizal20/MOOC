<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 4 Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

.question {
  margin-bottom: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

.question img {
  max-width: 100%;
  margin: 10px 0;
  border-radius: 8px;
}

label {
  display: block;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
}

.small-text {
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
<h1>Topic 4: Research Design</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit</button>

<div id="result" class="result"></div>
</div>

<script>

const quizData = [
  {
    q: "38. The research design is like a blueprint and it describes the entire framework or plan for a research project.",
    options: ["Yes", "No"],
    answer: 0
  },

  {
    q: `39. The followings are the characteristics of ___ research:

i. To gain qualitative insights and understanding of the problem (e.g. underlying reasons and motivations)
ii. Sampling is less stringent on representativeness and randomness
iii. Sample size is generally small
iv. Unstructured and flexible in data collection`,
    options: [
      "Quantitative research",
      "Qualitative research",
      "Empirical research",
      "Hypothetical research"
    ],
    answer: 1
  },

  {
    q: "40. Quantitative research is more statistical in nature.",
    options: ["Yes", "No"],
    answer: 0
  },

  {
    q: `41.The above are characteristics of ____ data.`,
i. For the problem at hand
ii. Data collection process is complex and involved
iii. Cost incurred is relatively high
iv. Time consuming


    options: [
      "Secondary",
      "Tertiary",
      "Primary"
    ],
    answer: 2
  },

  {
    q: `42. Which one of the followings is NOT the disadvantage of longitudinal research?`,
    options: [
      "Information takes a considerable period of time to collect",
      "Need good cooperation from the respondents",
      "Information is obtained for more than once and usually is more reliable",
      "Relatively expensive to carry out since several studies will be conducted"
    ],
    answer: 2
  },

  {
    q: `43. The depth interview has the following advantages EXCEPT:`,
    options: [
      "It can uncover greater depth of insights",
      "It is always much better than focus group",
      "It attributes the responses directly to the respondents",
      "It results in free exchange of information"
    ],
    answer: 1
  },

  {
    q: "44. Which link for categorization of the type of research design is NOT true?",
    image: "images/question44.png",
    options: ["A", "B", "C", "D"],
    answer: 1
  },

  {
    q: "45. Descriptive research usually will answer the 6 Ws questions.",
    options: ["Yes", "No"],
    answer: 0
  },

  {
    q: `46. Causal research includes the followings EXCEPT:`,
    options: [
      "Experiment",
      "Cause-and-effect relationship",
      "Manipulation of variable(s)",
      "Cross-sectional descriptive research"
    ],
    answer: 3
  },

  {
    q: `47. The followings are the advantages of Focus Groups EXCEPT:`,
    options: [
      "Speed",
      "Synergy",
      "Structure",
      "Size"
    ],
    answer: 3
  },

  {
    q: `48. The conditions for causality includes: Logical time sequence, ____ and control for other causal factor(s).`,
    options: [
      "Commitment",
      "Concomitant variation",
      "Concise measurement",
      "Co-creation"
    ],
    answer: 1
  },

  {
    q: `49. Which of the following is NOT a Projective Technique?`,
    options: [
      "Word association",
      "Sentence completion",
      "Projection",
      "Construction"
    ],
    answer: 2
  }
];

const quiz = document.getElementById("quiz");

quizData.forEach((item, i) => {
  let html = `<div class="question">`;

  html += `<p class="small-text">${item.q}</p>`;

  if (item.image) {
    html += `<img src="${item.image}" alt="question image">`;
  }

  item.options.forEach((opt, j) => {
    html += `
      <label>
        <input type="radio" name="q${i}" value="${j}">
        ${opt}
      </label>
    `;
  });

  html += `</div>`;
  quiz.innerHTML += html;
});

function submitQuiz() {
  let score = 0;

  quizData.forEach((item, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && parseInt(selected.value) === item.answer) {
      score++;
    }
  });

  document.getElementById("result").innerText =
    `Your Score: ${score} / ${quizData.length}`;
}

</script>

</body>
</html>
