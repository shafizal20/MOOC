<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 4 Quiz</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
  color: #1e3a8a;
}

.question {
  margin-bottom: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #fafafa;
}

.question img {
  max-width: 100%;
  margin: 10px 0;
  border-radius: 8px;
}

label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #1d4ed8;
}

.result {
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
<h1>Topic 4: Research Design</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

<div id="result" class="result"></div>
</div>

<script>

const quizData = [
{
q: "38. The research design is like a blueprint...",
options: ["Yes","No"],
answer: 0
},
{
q: `39. The followings are the characteristics of ___ research:
i. To gain qualitative insights
ii. Sampling is less strict
iii. Small sample size
iv. Flexible data collection`,
options: [
"Quantitative",
"Qualitative",
"Experimental",
"Survey"
],
answer: 1
},
{
q: "40. Quantitative research is more statistical in nature.",
options: ["Yes","No"],
answer: 0
},
{
q: `41. Characteristics of ____ data:
i. For the problem
ii. Complex collection
iii. High cost
iv. Time consuming`,
options: ["Secondary","Tertiary","Primary"],
answer: 2
},
{
q: "44. Identify NOT true link.",
image: "https://raw.githubusercontent.com/shafizal20/MCQ/main/images/question44.png",
options: ["A","B","C","D"],
answer: 1
},
{
q: `48. Conditions for causality:
Logical time sequence, ____ and control`,
options: [
"Commitment",
"Concomitant variation",
"Measurement",
"Co-creation"
],
answer: 1
},
{
q: `49. NOT a Projective Technique`,
options: [
"Word association",
"Sentence completion",
"Projection",
"Construction"
],
answer: 2
}
];

const quiz = document.getElementById("quiz");

// BUILD QUIZ
quizData.forEach((item, i) => {
let html = `<div class="question">`;
html += `<p>${item.q.replace(/\n/g,"<br>")}</p>`;

if(item.image){
html += `<img src="${item.image}" alt="image">`;
}

item.options.forEach((opt,j)=>{
html += `
<label>
<input type="radio" name="q${i}" value="${j}">
${opt}
</label>
`;
});

html += `</div>`;
quiz.innerHTML += html;
});

// SUBMIT FUNCTION
function submitQuiz(){
let score = 0;

quizData.forEach((item,i)=>{
const selected = document.querySelector(`input[name="q${i}"]:checked`);
if(selected && parseInt(selected.value) === item.answer){
score++;
}
});

document.getElementById("result").innerHTML =
`Your Score: ${score} / ${quizData.length}`;
}

</script>

</body>
</html>
