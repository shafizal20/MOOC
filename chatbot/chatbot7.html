<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Sampling Design & Procedures (Topic 7)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 7: Sampling Design</span>
        <div class="sub">🎯 Population • Sample • Probability vs Non-Probability • Sample Size</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is probability sampling?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 7 - Sampling Design and Procedures" (non-probability & probability sampling)</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 7 PDF
    function getSamplingAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Key Sampling Terms ---
        if ((q.includes("population") && q.includes("sample")) || (q.includes("sampling terms") || (q.includes("element") && q.includes("sampling frame")))) {
            return formatBold("**Key Sampling Terms**\n\n**Population** – entire group of people, objects, events, or things of interest to investigate.\n\n**Element** – a single member of the population. If all elements are included, it's a census.\n\n**Sampling Frame** – representation or list of the target population (e.g., Staff Directory).\n\n**Sample** – a subset of the population selected for data collection.\n\n**Subject/Respondent** – a single member of the sample.");
        }
        
        // --- Sampling Process (5 steps) ---
        if ((q.includes("sampling process") || q.includes("steps in sampling"))) {
            return formatBold("**The Sampling Process** (5 steps):\n\n1️⃣ **Define the target population** – identify the specific, complete group relevant to the research.\n\n2️⃣ **Select the sampling frame** – obtain a list of elements (must be complete, accurate, up-to-date).\n\n3️⃣ **Determine the sampling technique** – choose between non-probability (exploratory) or probability (conclusive).\n\n4️⃣ **Determine the sample size** – consider importance of decision, nature of research, number of variables, data analysis, resources.\n\n5️⃣ **Select the sampling units** – execute the sampling process.");
        }
        
        // --- Non-Probability Sampling Techniques ---
        if ((q.includes("non-probability") || q.includes("non probability")) && (q.includes("sampling") || q.includes("technique"))) {
            return formatBold("**Non-Probability Sampling Techniques**\n\nNo chance selection procedures. Not every element has a known chance to be selected. Based on researcher's judgment.\n\n1️⃣ **Convenience Sampling** – elements selected based on convenience.\n\n2️⃣ **Judgmental Sampling (Purposive)** – careful selection of elements representing relevant characteristics.\n\n3️⃣ **Quota Sampling** – allocate quotas for various strata (proportionate to population). Steps: understand composition, develop quotas (%), select based on convenience/judgment.\n\n4️⃣ **Snowball Sampling** – uses referrals; each contact recommends additional members. Useful when no sampling frame exists or for sensitive topics (corruption, divorce, smoking, prostitution).");
        }
        
        // --- Probability Sampling Techniques ---
        if ((q.includes("probability sampling") || (q.includes("probability") && q.includes("sampling"))) && !q.includes("non")) {
            return formatBold("**Probability Sampling Techniques**\n\nEvery element of the target population has a fixed chance to be selected. Sampling units selected by chance (fair process).\n\n1️⃣ **Simple Random Sampling** – every possible combination has known and equal chance. Steps: select sampling frame, assign serial numbers, select using random number table or computer-generated numbers.\n\n2️⃣ **Systematic Sampling** – select at fixed interval after random start. Interval = N/n.\n\n3️⃣ **Stratified Sampling** – divide population into meaningful strata, draw independent random samples from each stratum.\n\n4️⃣ **Cluster Sampling** – divide into natural groups/clusters, draw random sample of clusters (multi-stage possible).");
        }
        
        // --- Simple Random Sampling ---
        if ((q.includes("simple random") || q.includes("simple random sampling"))) {
            return formatBold("**Simple Random Sampling**\n\nA probability sampling procedure where every possible combination of elements has a known and equal chance to be selected. Each element is selected independently.\n\n**Steps:**\n1. Select the sampling frame\n2. Assign serial numbers to all elements\n3. Select sampling units using random number table or computer-generated numbers\n\nIf N=2000, select last four digits of random numbers that are ≤ 2000 until 200 different numbers are selected.");
        }
        
        // --- Systematic Sampling ---
        if ((q.includes("systematic sampling") || (q.includes("systematic") && q.includes("sampling")))) {
            return formatBold("**Systematic Sampling**\n\nSampling units selected from the sampling frame at a fixed interval (the i-th item) after a random start.\n\n**Sampling interval** = N/n (population size divided by sample size, rounded to whole number).\n\n**Steps:**\n1. Select sampling frame, assign serial numbers\n2. Calculate sampling interval (e.g., use 11 instead of 10.58)\n3. Randomly select first number (e.g., 0480)\n4. Select subsequent numbers at fixed i intervals until sample size achieved");
        }
        
        // --- Stratified Sampling ---
        if ((q.includes("stratified sampling") || (q.includes("stratified") && q.includes("sampling")))) {
            return formatBold("**Stratified Sampling**\n\nA probability sampling procedure where the population is first divided into meaningful strata, then independent random samples are drawn from each stratum.\n\n**Steps:**\n1. Select sampling frame\n2. Determine variables for stratification and number of strata\n3. Divide target population into strata\n4. Assign serial numbers to elements in each stratum\n5. Determine sample size (normally proportionate) for each stratum\n6. Select samples using simple random or systematic sampling within each stratum");
        }
        
        // --- Cluster Sampling ---
        if ((q.includes("cluster sampling") || (q.includes("cluster") && q.includes("sampling")))) {
            return formatBold("**Cluster Sampling**\n\nPopulation divided into natural groups or geographical areas (clusters), then a random sample of clusters is drawn.\n\n**Two-stage cluster sampling steps:**\n1. Assign serial numbers to all elements\n2. Divide population into clusters\n3. Calculate sample interval\n4. Select random number\n5. Identify elements\n6. Select clusters containing these elements\n7. Select sampling units randomly within each selected cluster");
        }
        
        // --- Quota Sampling ---
        if ((q.includes("quota sampling") || (q.includes("quota") && q.includes("sampling")))) {
            return formatBold("**Quota Sampling**\n\nA non-probability sampling technique involving allocation of quotas for various strata (normally proportionate to population representation).\n\n**Steps:**\n1. Understand composition of population\n2. Develop quotas (%) using meaningful control characteristics (gender, race, position, qualification)\n3. Ensure sample proportions match population proportions\n4. Select elements based on convenience or judgment\n\n**Example:** For 200 employees, 40% male (80), 60% female (120); Race: Malay 30% (60), Chinese 30% (60), Dayak 30% (60), Others 10% (20).");
        }
        
        // --- Snowball Sampling ---
        if ((q.includes("snowball sampling") || (q.includes("snowball") && q.includes("sampling")))) {
            return formatBold("**Snowball Sampling**\n\nA non-probability sampling technique that uses referrals to obtain units of analysis. Each contact is asked to recommend or identify additional members of the target population, who then name others, and so on.\n\n**When to use:** When no sampling frame is available.\n\n**Common applications:** Studies involving sensitive or illegal activities like corruption, divorce, smoking, and prostitution.");
        }
        
        // --- Convenience Sampling ---
        if ((q.includes("convenience sampling") || (q.includes("convenience") && q.includes("sampling")))) {
            return formatBold("**Convenience Sampling**\n\nA non-probability sampling procedure where elements are selected based on the convenience of the researcher.\n\n**Example:** Doing an exploratory study of job satisfaction in the researcher's organization, selecting 200 employees out of 2,000 based on convenience (easy access, availability).");
        }
        
        // --- Judgmental Sampling ---
        if ((q.includes("judgmental sampling") || (q.includes("purposive sampling")) || (q.includes("judgment") && q.includes("sampling")))) {
            return formatBold("**Judgmental Sampling (Purposive Sampling)**\n\nA non-probability sampling technique involving careful selection of elements that represent relevant characteristics of the target population.\n\n**Example:** Select all full-time frontline employees because they are believed to be the most suitable respondents for a study on service quality.");
        }
        
        // --- Sample Size Determination (General) ---
        if ((q.includes("sample size") && (q.includes("determine") || q.includes("determination"))) || (q.includes("how many") && q.includes("sample"))) {
            return formatBold("**Sample Size Determination**\n\n**Qualitative considerations:** importance of decision, nature of research (exploratory needs smaller size), number of variables, nature of data analysis, resource availability.\n\n**Krejcie & Morgan (1970) table examples:**\n• N=100 → n=80\n• N=500 → n=217\n• N=1,000 → n=278\n• N=10,000 → n=370\n• N=100,000 → n=384\n\n**Typical ranges:**\n• Problem identification research: 500 (1000-2500)\n• Problem solving research: 200 (300-500)\n• Product test: 200 (300-500)\n• Focus groups: 6 groups (10-15 groups)");
        }
        
        // --- Statistical Approach to Sample Size (Mean) ---
        if ((q.includes("confidence interval") && q.includes("sample size")) || (q.includes("formula") && q.includes("sample size")) || (q.includes("n =") && q.includes("z"))) {
            return formatBold("**Statistical Sample Size Determination**\n\n**Using Mean:** n = (σ²z²) / D²\nWhere: D = precision level, z = z-value for confidence level, σ = population standard deviation\n\n**Using Proportion:** n = [π(1-π)z²] / D²\nWhere: π = population proportion estimate\n\n**Effect Size Method (Hypothesis Testing):**\nOne sample: N = [(Zα + Zβ)s / ES]²\nTwo independent samples: N = 2[(Zα + Zβ)s / ES]²\nWhere: α = alpha (Type I error), β = beta (Type II error), ES = effect size");
        }
        
        // --- Sampling Frame ---
        if ((q.includes("sampling frame"))) {
            return formatBold("**Sampling Frame**\n\nThe representation or list of the target population. It provides an operational definition of the population and the basis for drawing a sample.\n\n**Requirements:** Must be as complete, accurate, and up-to-date as possible.\n\n**Examples:** Customer lists, yellow pages, mailing lists, membership directories, staff directories.");
        }
        
        // --- Census vs Sample ---
        if ((q.includes("census") && (q.includes("sample") || q.includes("sampling")))) {
            return formatBold("**Census vs Sample**\n\n**Census** – when ALL elements of the population are included in the study.\n\n**Sample** – a subset of the population selected for data collection.\n\nMost marketing research uses sampling (not census) because populations are often too large to study entirely. Good sampling allows generalization of findings from sample to population.");
        }
        
        // --- When to use probability vs non-probability ---
        if ((q.includes("when to use") && (q.includes("probability") || q.includes("non-probability"))) || (q.includes("choose") && q.includes("sampling technique"))) {
            return formatBold("**Choosing Sampling Technique**\n\n| Factor | Non-Probability | Probability |\n|--------|----------------|-------------|\n| Nature of research | Exploratory | Conclusive |\n| Sampling errors | Non-sampling errors large | Sampling errors large |\n| Variability in population | Low | High |\n| Statistical analysis | Descriptive | Inferential |\n\n**Recommendation:** Use probability sampling for conclusive research (descriptive/causal) where generalization to population is required. Use non-probability for exploratory research.");
        }
        
        // --- Defining target population ---
        if ((q.includes("target population") || q.includes("define population"))) {
            return formatBold("**Defining the Target Population**\n\nThe first step in the sampling process. The target population is the specific, complete group which is relevant to the research project.\n\n**Example:** 'All the patients of Grace Hospital' if the research is on hospital service quality.\n\nThe definition must be clear, precise, and include all elements that possess the characteristics of interest.");
        }
        
        // --- Effect size, alpha, power ---
        if ((q.includes("effect size") || q.includes("alpha") || q.includes("power") || q.includes("type i error") || q.includes("type ii error"))) {
            return formatBold("**Alpha, Power, and Effect Size**\n\n**Alpha (α)** – probability of rejecting the null when null is true (Type I error). Should be small (e.g., 0.05).\n\n**Power** – probability of correctly rejecting the null (1 - β). Should be high (e.g., 0.80).\n\n**Effect Size (ES)** – degree of association between variables or magnitude of difference that makes it meaningful. Small effect size allows detection of even small effects.\n\nThese three factors determine minimum sample size in hypothesis testing: N = [(Zα + Zβ)s / ES]²");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 7: Sampling Design and Procedures**\n\nTry asking about:\n• Key sampling terms (population, element, sampling frame, sample, subject)\n• Sampling process (5 steps)\n• Non-probability sampling (convenience, judgmental, quota, snowball)\n• Probability sampling (simple random, systematic, stratified, cluster)\n• Sample size determination (qualitative & statistical approaches)\n• Krejcie & Morgan sample size table\n• Confidence interval approach for sample size\n• Effect size, alpha, power\n• When to use probability vs non-probability sampling\n• Quota sampling with example\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        
        // text already contains HTML <strong> tags from formatBold
        const formattedText = text.replace(/\n/g, '<br>');
        
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            
            const answer = getSamplingAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        
        addMessage(rawText, true);
        inputEl.value = '';
        
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
