<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Research Design (Topic 4)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 4: Research Design</span>
        <div class="sub">🔬 Framework • Plan • Blueprint — Exploratory, Descriptive, Causal</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is research design?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 4 - Research Design" (exploratory, descriptive, causal research)</div>
</div>

<script>
    // Helper function to convert markdown-style **bold** to HTML <strong> tags
    function formatBold(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // Comprehensive knowledge base derived from Topic 4 PDF
    function getResearchDesignAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Research Design definition ---
        if ((q.includes("research design") && (q.includes("what is") || q.includes("definition") || q.includes("meaning"))) || (q.includes("framework") && q.includes("research"))) {
            return formatBold("**Research Design**\n\nA research design is the framework or plan for a research project. It includes the procedures necessary for obtaining the information needed to structure or solve a marketing research problem.\n\nA good research design minimizes the danger of haphazard collection of information and ensures that the decision maker has the information needed. It is like a roadmap to avoid getting lost.");
        }
        
        // --- Qualitative vs Quantitative Research ---
        if ((q.includes("qualitative") && q.includes("quantitative")) || (q.includes("difference between qualitative") && q.includes("quantitative"))) {
            return formatBold("**Qualitative vs Quantitative Research**\n\n**Qualitative Research** – unstructured, exploratory methodology based on small samples. Provides insight and understanding of the problem setting. Findings should NOT be generalized to population.\n\n**Quantitative Research** – seeks to quantify data and typically applies statistical analysis.\n\n**Key principle:** Both are complementary, not in competition. Qualitative should precede quantitative when addressing new problems.\n\n**Purposes of qualitative research:** define problem more clearly, suggest hypotheses, generate new ideas, pre-test questionnaires.");
        }
        
        // --- Cross-sectional vs Longitudinal Research ---
        if ((q.includes("cross-sectional") || q.includes("cross sectional")) && (q.includes("longitudinal") || (q.includes("vs") && q.includes("longitudinal")))) {
            return formatBold("**Cross-sectional vs Longitudinal Research**\n\n**Cross-sectional Research** – collects information from sample(s) at ONE point in time only.\n• Single cross-sectional: one sample\n• Multiple cross-sectional: two or more samples (cohort analysis is a special type)\n\n**Longitudinal Research** – involves a fixed sample measured repeatedly across different points in time. The sample remains the same, providing a series of pictures showing changes over time (also called panel).\n\n**Longitudinal advantages:** more reliable information, identifies patterns and changes over time.\n**Disadvantages:** expensive, time-consuming, requires respondent cooperation, sophisticated design needed.");
        }
        
        // --- Primary vs Secondary Data ---
        if ((q.includes("primary data") && q.includes("secondary data")) || (q.includes("difference between primary") && q.includes("secondary"))) {
            return formatBold("**Primary vs Secondary Data**\n\n| Aspect | Primary Data | Secondary Data |\n|--------|--------------|----------------|\n| Purpose | For the problem at hand | For other problems |\n| Collection | Complex and involved | Relatively fast and easy |\n| Cost | Relatively high | Relatively low |\n| Time | Time consuming | Less time consuming |\n\n**Primary data** – originated by researcher for specific purpose. Expensive but directly addresses the research problem.\n\n**Secondary data** – collected for purposes other than the problem at hand. Located quickly and inexpensively from internal sources (accounting, sales records) or external sources (government, libraries, trade associations).");
        }
        
        // --- Exploratory Research ---
        if ((q.includes("exploratory research") || (q.includes("exploratory") && q.includes("design")))) {
            return formatBold("**Exploratory Research**\n\nA type of investigation that is NOT regarded as conclusive. It is used to explore or search through a problem to provide insights and understanding.\n\n**Purposes:**\n• Formulate or define problem more precisely\n• Identify alternative courses of action\n• Develop hypotheses\n• Isolate key variables and relationships for further conclusive research\n\n**Methods:** secondary data analysis, focus groups, depth interviews, projective techniques.");
        }
        
        // --- Descriptive Research ---
        if ((q.includes("descriptive research") || (q.includes("descriptive") && q.includes("design")))) {
            return formatBold("**Descriptive Research**\n\nA type of conclusive research whose main objective is to describe the problem in a systematic way. It describes the functions, nature, characteristics, and associations or relationships of variables.\n\n**Guided by 6 Ws:** Who? What? When? Where? Why? Way? (In what way)\n\n**Common methods:** Surveys and observation. Survey methods include personal interview (in-home, mall-intercept, computer-assisted), telephone interview, mail interview, fax, electronic (email, internet, mobile).");
        }
        
        // --- Causal Research ---
        if ((q.includes("causal research") || (q.includes("causal") && q.includes("design")) || (q.includes("cause and effect")))) {
            return formatBold("**Causal Research**\n\nA type of conclusive research whose major objective is to obtain evidence regarding cause and effect relationships. Purpose is to understand which variables are causes (independent) and which are effects (dependent).\n\n**Three conditions for causality:**\n\n1️⃣ **Logical time sequence** – cause must precede or occur simultaneously with effect\n2️⃣ **Concomitant variation** – cause and effect vary together as hypothesized\n3️⃣ **Control for other causal factors** – eliminate other factors that could influence the relationship\n\n**Main method:** Experimentation. Causality can never be absolute because random error can never be controlled completely, but highly controlled environments increase confidence.");
        }
        
        // --- Focus Groups ---
        if ((q.includes("focus group") || q.includes("focus groups"))) {
            return formatBold("**Focus Groups**\n\nA focus group interview is conducted by a trained moderator in an unstructured, natural manner with a small group (typically 8-12 members). Groups should be homogeneous in demographic/socioeconomic characteristics.\n\n**Variations:** two-way focus group (target group listens to related group), dual-moderator group (one manages flow, other ensures specific issues discussed).\n\n**Advantages (10 S's):** Synergism, Serendipity, Snowballing, Stimulation, Security, Spontaneity, Specialization, Scientific scrutiny, Structure, Speed.\n\n**Disadvantages:** can be misused as conclusive rather than exploratory, quality depends on moderator skill, analysis difficult.");
        }
        
        // --- Depth Interviews ---
        if ((q.includes("depth interview") || q.includes("in-depth interview") || q.includes("depth interviews"))) {
            return formatBold("**Depth Interviews**\n\nUnstructured, direct, one-to-one interviews lasting 30 minutes to over 1 hour.\n\n**Three techniques:**\n\n1️⃣ **Laddering** – questioning proceeds from product characteristics to user characteristics\n2️⃣ **Hidden issue questioning** – locates personal sore spots related to deeply felt concerns\n3️⃣ **Symbolic analysis** – analyzes symbolic meaning by comparing with opposites\n\n**Advantages:** uncovers greater depth of insights, responses attributed directly to respondent, free exchange of information.\n\n**Disadvantages:** skilled interviewers are expensive and difficult to find, results susceptible to interviewer influence, data difficult to analyze.");
        }
        
        // --- Projective Techniques ---
        if ((q.includes("projective technique") || q.includes("projective techniques") || q.includes("word association") || q.includes("sentence completion") || q.includes("cartoon test"))) {
            return formatBold("**Projective Techniques**\n\nUnstructured, indirect form of questioning that encourages respondents to project their underlying motivations, beliefs, attitudes, or feelings.\n\n**Common techniques:**\n\n• **Word association** – respond with first word that comes to mind\n• **Sentence completion** – complete partial sentences\n• **Construction** – respond with story (picture response, cartoon tests)\n• **Expressive** – role playing, third-person technique\n\n**Advantages:** increases validity by disguising purpose, helpful when motivations operate at subconscious level.\n\n**Disadvantages:** risk of interpretation bias, expensive (requires highly trained interviewers and interpreters).");
        }
        
        // --- Unit of Analysis ---
        if ((q.includes("unit of analysis") || q.includes("units of analysis"))) {
            return formatBold("**Unit of Analysis**\n\nThe level of aggregation of data collected. Must be clearly determined to avoid confusion during data analysis.\n\n**Four types:**\n\n1️⃣ **Individual** – each individual response as separate data source (e.g., patient perception of hospital quality)\n2️⃣ **Dyad** – two-person groups or pairs (e.g., doctor-patient interactions)\n3️⃣ **Group** – more than two persons (e.g., patient group interactions)\n4️⃣ **Organization** – entire organization (e.g., employee interaction patterns across hospitals)");
        }
        
        // --- Survey methods (list) ---
        if ((q.includes("survey methods") || q.includes("types of surveys") || q.includes("personal interview") && q.includes("telephone"))) {
            return formatBold("**Survey Methods in Marketing Research**\n\n**Personal Interview** – in-home, mall-intercept, computer-assisted\n\n**Telephone Interview** – traditional, computer-assisted (CATI)\n\n**Mail Interview** – traditional mail, mail panel (pre-recruited households)\n\n**Fax Interview** – short questionnaires via fax\n\n**Electronic Interview** – email, internet (web location), mobile (SMS feedback)");
        }
        
        // --- Advantages/disadvantages of longitudinal ---
        if ((q.includes("longitudinal advantages") || (q.includes("longitudinal") && q.includes("advantage")))) {
            return formatBold("**Longitudinal Research: Advantages & Disadvantages**\n\n**Advantages:**\n• Information obtained more than once, usually more reliable\n• Takes changes related to time into consideration (can identify patterns)\n\n**Disadvantages:**\n• Relatively expensive (several studies conducted)\n• Takes considerable time to collect information\n• Requires a lot of cooperation from respondents\n• Requires more sophisticated design to control potential bias");
        }
        
        // --- Panel (longitudinal) ---
        if ((q.includes("panel") && q.includes("longitudinal")) || (q.includes("panel study"))) {
            return formatBold("**Panel (Longitudinal Design)**\n\nA panel comprises a sample, generally households that have agreed to provide information at specified intervals over an extended period. The term 'panel' is often used interchangeably with longitudinal design. The sample remains the same over time, providing a series of pictures that portray a vivid illustration of the situation and changes taking place over time.");
        }
        
        // --- Conclusive research ---
        if ((q.includes("conclusive research") || (q.includes("conclusive") && q.includes("design")))) {
            return formatBold("**Conclusive Research**\n\nResearch that provides information useful for decision making. It includes:\n\n**Descriptive Research** – describes problems systematically\n**Causal Research** – examines cause and effect relationships\n\nExploratory research (unstructured, provides insights) is NOT conclusive; it is often followed by conclusive research to test hypotheses.");
        }
        
        // --- 6 Ws of descriptive research ---
        if ((q.includes("6 ws") || q.includes("six ws") || (q.includes("who what when where why")))) {
            return formatBold("**The 6 Ws of Descriptive Research**\n\nDescriptive research is guided by:\n1. Who?\n2. What?\n3. When?\n4. Where?\n5. Why?\n6. Way? (In what way)\n\nThese enquiries help systematically describe the problem, its nature, characteristics, and relationships of variables.");
        }
        
        // --- Conditions for causality ---
        if ((q.includes("conditions for causality") || (q.includes("causality") && q.includes("conditions")))) {
            return formatBold("**Three Conditions for Causality**\n\n1️⃣ **Logical time sequence** – The cause must precede or occur simultaneously with the effect. It cannot occur later.\n\n2️⃣ **Concomitant variation** – The independent variable (cause) and dependent variable (effect) vary together as hypothesized. The stronger the relationship, the more confident the researcher.\n\n3️⃣ **Control for other causal factors** – All other factors that could influence the relationship must be eliminated as much as possible. Causality can never be absolute because random error cannot be controlled absolutely.");
        }
        
        // --- Laddering technique ---
        if ((q.includes("laddering"))) {
            return formatBold("**Laddering Technique**\n\nA depth interview technique where the line of questioning proceeds from product characteristics to user characteristics. It allows the researcher to tap into the consumer's network of meanings and requires interviewers to be trained in specific probing techniques to go beyond initial responses.");
        }
        
        // --- Probing ---
        if ((q.includes("probing"))) {
            return formatBold("**Probing**\n\nA technique used in depth interviews to go beyond the initial responses that interviewed participants give to a question. It helps uncover deeper meanings, motivations, and feelings that may not be revealed in the first answer.");
        }
        
        // --- Hidden issue questioning ---
        if ((q.includes("hidden issue") || q.includes("hidden issue questioning"))) {
            return formatBold("**Hidden Issue Questioning**\n\nA depth interview technique that attempts to locate personal 'sore spots' related to deeply felt personal concerns. It helps uncover sensitive or emotionally charged issues that respondents might not reveal directly.");
        }
        
        // --- Symbolic analysis ---
        if ((q.includes("symbolic analysis"))) {
            return formatBold("**Symbolic Analysis**\n\nA depth interview technique that attempts to analyze the symbolic meaning of objects by comparing them with their opposites. This helps understand the deeper meanings and associations that consumers attach to products, brands, or experiences.");
        }
        
        // --- Default fallback ---
        return formatBold("**Topic 4: Research Design**\n\nTry asking about:\n• Research design definition\n• Qualitative vs Quantitative research\n• Cross-sectional vs Longitudinal research\n• Primary vs Secondary data\n• Exploratory research\n• Descriptive research (6 Ws)\n• Causal research (3 conditions for causality)\n• Focus groups\n• Depth interviews (laddering, probing, hidden issue, symbolic analysis)\n• Projective techniques (word association, sentence completion, cartoon test)\n• Unit of analysis (individual, dyad, group, organization)\n• Survey methods (personal, telephone, mail, electronic)\n\nJust type your question!");
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        
        // text already contains HTML <strong> tags from formatBold
        const formattedText = text.replace(/\n/g, '<br>');
        
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            
            const answer = getResearchDesignAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        
        addMessage(rawText, true);
        inputEl.value = '';
        
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
