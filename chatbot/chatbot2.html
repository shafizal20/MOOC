<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR Tutor: Problem Definition (Topic 2)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #d4dee8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0A2B38;
            display: inline;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #e1ecf4;
            color: #1c6f9c;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .sub {
            font-size: 0.75rem;
            color: #5a6e8a;
            margin-top: 8px;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            background: #FCFDFF;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 86%;
        }

        .user-msg {
            align-self: flex-end;
        }

        .bot-msg {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.4rem;
            font-size: 0.88rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-bubble {
            background: #0F2C3D;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-bubble {
            background: #EFF3F8;
            color: #1f2f3e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        .time {
            font-size: 0.6rem;
            color: #8f9eb2;
            margin-top: 5px;
            margin-left: 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.6rem 1rem;
            background: #EFF3F8;
            width: fit-content;
            border-radius: 2rem;
            border-bottom-left-radius: 6px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8a9bb0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 0.9rem 1.2rem;
            background: white;
            border-top: 1px solid #eef2f7;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .input-area button {
            background: #0F2C3D;
            border: none;
            color: white;
            padding: 0 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .input-area button:hover {
            background: #1f526b;
            transform: scale(0.97);
        }
        .footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px 12px;
            color: #7c8ea0;
            background: #fafcff;
            border-top: 1px solid #edf2f8;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #cbd9e6;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-card { max-width: 100%; border-radius: 1.5rem; }
            .messages { height: 460px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header">
        <h1>Marketing Research AI</h1><span class="badge">Topic 2: Problem Definition</span>
        <div class="sub">🎯 Identify the real problem — not just the symptom!</div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot-msg">
            <div class="bubble bot-bubble">Hi! I'm your marketing research assistant.</div>
            <div class="time">now</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="e.g., What is the iceberg principle?" autocomplete="off">
        <button id="send">Send</button>
    </div>
    <div class="footer">📘 answers based on "Topic 2 - Defining Problem and Research Objectives" (scientific marketing research)</div>
</div>

<script>
    // Comprehensive knowledge base derived from the provided PDF material (Topic 2)
    function getProblemDefinitionAnswer(userQuery) {
        let q = userQuery.toLowerCase().trim();
        
        // --- Importance of problem definition ---
        if ((q.includes("importance") || q.includes("critical") || q.includes("why is")) && (q.includes("problem definition") || q.includes("defining the problem"))) {
            return "🔑 **Importance of Problem Definition**\n\nProblem identification and definition is one of the **most critical steps** in the marketing research process. A clearly defined problem enables the research to be properly conducted. If the problem is well-defined, the research can be designed and executed correctly. Poor problem definition leads to irrelevant research and wasted resources. As the material states: *'A well-identified and defined problem is possibly half-solved.'*";
        }
        
        // --- Iceberg principle (symptoms vs real problem) ---
        if ((q.includes("iceberg") || q.includes("symptom") || q.includes("symptoms") || q.includes("real problem")) && (q.includes("principle") || q.includes("iceberg principle"))) {
            return "🧊 **Iceberg Principle**\n\nDecision makers are often aware of only **10% or less** of the actual problem — the observable symptoms (e.g., declining sales, employee complaints). The **real problem (90% or more)** is submerged below the surface, hidden from immediate observation.\n\n🔍 **Example**: High employee turnover (symptom) may be caused by low job satisfaction, poor management, or lack of motivation (real problems).\n\nResearchers must investigate comprehensively to uncover the true problem, not just treat symptoms.";
        }
        
        // --- Tasks involved in problem definition (4 tasks) ---
        if ((q.includes("tasks") || q.includes("steps to define") || q.includes("how to define")) && (q.includes("problem definition") || q.includes("define the problem"))) {
            return "📋 **Tasks Involved in Problem Definition** (from Topic 2):\n\n1️⃣ **Discussions with decision makers** – formal/informal talks to understand the right problem and information needed.\n2️⃣ **Interviews with industry experts** – knowledgeable, experienced professionals from client organization or academia.\n3️⃣ **Literature search & secondary data analysis** – reliable published/unpublished sources provide economical, quick insights.\n4️⃣ **Qualitative research or pilot study** – focus groups, in-depth interviews, small-scale studies to gain insights and identify constraints.\n\nThese tasks help understand the environmental context and refine the research problem.";
        }
        
        // --- Environmental factors (list of 10 factors) ---
        if ((q.includes("environmental factors") || q.includes("environmental context") || q.includes("factors to consider")) && (q.includes("problem definition") || q.includes("define"))) {
            return "🌍 **Environmental Factors in Problem Definition** (10 factors):\n\n1. Past information & forecasts\n2. Resources and constraints (money, time, expertise)\n3. Objectives (organizational or individual)\n4. Competitor environment\n5. Behaviours of consumers/individuals\n6. Legal and political environment\n7. Economic environment (interest rates, inflation, income)\n8. Technology environment\n9. Socio-cultural environment (cultural differences)\n10. Geographical and physical environment (infrastructure, climate)\n\nUnderstanding these helps translate management decision problems into researchable problems.";
        }
        
        // --- Specific environmental factor queries (e.g., competitor, economic, legal) ---
        if ((q.includes("competitor") || q.includes("competition")) && (q.includes("environment") || q.includes("factor"))) {
            return "🏢 **Competitor Environment** – The actions and reactions of close and potential competitors must be understood. Competitor analysis reveals what problems the units of analysis face and facilitates the problem definition process. It helps identify threats and opportunities.";
        }
        if ((q.includes("economic environment") || q.includes("interest rate") || q.includes("inflation")) && (q.includes("factor") || q.includes("environmental"))) {
            return "💰 **Economic Environment** – Economic variables such as interest rates, unemployment, foreign exchange, international trade, inflation, and income are closely linked to the socio-economic wellbeing of the organization and individuals. These affect purchasing power and should be considered when defining the research problem.";
        }
        if ((q.includes("legal") || q.includes("political")) && (q.includes("environment") || q.includes("factor"))) {
            return "⚖️ **Legal and Political Environment** – Includes public policies, laws, government agencies, and special interest groups that influence or regulate organizations. Example: An increase in income tax rates affects disposable income and purchasing power.";
        }
        if ((q.includes("socio") || q.includes("cultural")) && (q.includes("environment") || q.includes("factor"))) {
            return "👥 **Socio-cultural Environment** – Cultural characteristics and differences between potential units of analysis are crucial, especially for multicultural countries like Malaysia. These differences provide researchers with ideas about what problems should be investigated.";
        }
        if ((q.includes("technology") || q.includes("tech")) && (q.includes("environment") || q.includes("factor"))) {
            return "💻 **Technology Environment** – The technological ability of organizations or individuals affects the scope of research. It influences the use of appropriate research methods and thus influences the research problem component in problem definition.";
        }
        if ((q.includes("resources") || q.includes("constraints")) && (q.includes("problem definition"))) {
            return "⏳ **Resources and Constraints** – Resources like money, time, expertise, and research skills need to be considered in the problem definition process. Constraints force the problem to be defined into an appropriate scope, increasing relevance.";
        }
        if ((q.includes("past information") || q.includes("forecasts") || q.includes("historical"))) {
            return "📊 **Past Information and Forecasts** – Historical data such as marketing performance records and past industry data put the current problem into context. For time-series studies, external sources like Statistical Reports and Economic Reports are also valuable.";
        }
        if ((q.includes("objectives") && (q.includes("organizational") || q.includes("individual")))) {
            return "🎯 **Objectives (Organizational or Individual)** – Decisions are made to accomplish objectives. Understanding the client's or organization's objectives helps pinpoint exact desired outcomes, especially important for external researchers who don't know the organization well.";
        }
        if ((q.includes("geographical") || q.includes("physical environment") || q.includes("infrastructure") || q.includes("climate"))) {
            return "🗺️ **Geographical and Physical Environment** – For unique situations, factors like infrastructure, accessibility, and climate may form a unique dimension of the problem and should be considered during problem definition.";
        }
        
        // --- Management decision problem vs research problem ---
        if ((q.includes("management decision") && q.includes("research problem")) || (q.includes("decision problem") && q.includes("research problem")) || (q.includes("difference between"))) {
            return "📌 **Management Decision Problem vs Research Problem**\n\n| Aspect | Management Decision Problem | Research Problem |\n|--------|----------------------------|------------------|\n| **Focus** | What decision makers need to DO | What INFORMATION is needed |\n| **Question** | 'What should we do?' | 'What information is needed and how best to obtain it?' |\n| **Nature** | Action-oriented, managerial issues | Information/knowledge gaps |\n\n**Examples:**\n• 'Should employee salaries be increased?' → 'Determine employees' perception of current salary.'\n• 'What to do to improve job satisfaction?' → 'Determine determinants of job satisfaction.'";
        }
        
        // --- Funnel technique (broad to specific) ---
        if ((q.includes("funnel") || q.includes("broad to specific") || q.includes("funnel technique"))) {
            return "🔽 **Funnel Technique** (Broad → Specific Problems)\n\nStart with a **broad problem area** to gain perspective, then identify **specific components** for investigation.\n\n**Example:**\n• Broad: 'There are more and more employee complaints. High staff turnover.'\n• Specific (after refining): 'Determinants of service quality' and 'Effects of service quality on customer loyalty.'\n\nThe technique provides clear guidelines and focuses on key aspects of the problem.";
        }
        
        // --- Symptoms vs problem clarification ---
        if ((q.includes("symptom") && !q.includes("iceberg")) || (q.includes("signs") && q.includes("problem"))) {
            return "⚠️ **Symptoms vs Real Problem**\n\nSymptoms are **observable conditions** that signal the presence of problems (e.g., declining sales, high turnover, low morale). However, symptoms are NOT the real problem — they are effects.\n\nResearchers must dig deeper to uncover the underlying causes. Treating symptoms without solving the real problem leads to temporary fixes and wasted resources. This is why the Iceberg Principle is so important!";
        }
        
        // --- Unit of analysis ---
        if ((q.includes("unit of analysis") || q.includes("units of analysis"))) {
            return "🔍 **Unit of Analysis** – The 'who' or 'what' being studied (e.g., individuals, dyads, groups, organizations, departments). Determining the unit of analysis is part of the problem definition process and influences research design, data collection, and analysis.";
        }
        
        // --- Relevant variables ---
        if ((q.includes("relevant variables") || q.includes("variables in problem definition"))) {
            return "📊 **Relevant Variables** – During problem definition, researchers must identify and isolate the variables that are pertinent to the research problem. Variables can be independent, dependent, moderating, or confounding. Clear variable identification leads to precise research questions and hypotheses.";
        }
        
        // --- Research questions and objectives ---
        if ((q.includes("research questions") || q.includes("research objectives") || q.includes("hypotheses")) && (q.includes("problem definition"))) {
            return "❓ **Research Questions, Hypotheses, and Objectives** – After defining the problem, researchers formulate:\n• **Research objectives** – what the study aims to achieve\n• **Research questions** – specific inquiries to be answered\n• **Hypotheses** – testable propositions about relationships between variables\n\nThese guide the entire research process and are part of Step 2 (Developing the Approach).";
        }
        
        // --- Why problem definition is critical (general) ---
        if ((q.includes("why important") || q.includes("critical step")) && !q.includes("importance")) {
            return "⚠️ **Why Problem Definition is Critical**\n\n• Prevents irrelevant research and wasted resources\n• Provides clear direction for the entire marketing research process\n• Helps distinguish symptoms from real problems\n• Enables researchers to focus on what truly matters\n• As the material says: *'A well-identified and defined problem is possibly half-solved.'*\n\nWithout proper problem definition, even the most sophisticated research design will fail to deliver actionable insights.";
        }
        
        // --- Broad problem examples / gaps ---
        if ((q.includes("gap") || q.includes("gaps") || q.includes("broad problem area")) && (q.includes("example") || q.includes("examples"))) {
            return "🔎 **Example of Broad Problem → Specific Research Gaps**\n\n**Broad problem symptoms:**\n• More and more employee complaints\n• High staff turnover\n\n**After refining (specific problems to investigate):**\n1. The determinants of service quality\n2. The effects of service quality on customer loyalty\n\n**Gap to close:** Understanding how service quality influences loyalty in a specific organizational context.";
        }
        
        // --- default fallback (helpful but concise) ---
        return "📘 I'm here to help with **Topic 2: Defining the Problem and Research Objectives**.\n\nTry asking about:\n• Iceberg principle\n• Tasks in problem definition\n• Environmental factors (economic, legal, competitive, etc.)\n• Management decision vs research problem\n• Funnel technique\n• Or just type a specific question from the chapter!";
    }

    // UI elements
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
        const messageWrapper = document.createElement('div');
        messageWrapper.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        
        // convert newlines to <br> for better formatting
        const formattedText = text.replace(/\n/g, '<br>');
        
        messageWrapper.innerHTML = `
            <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${formattedText}</div>
            <div class="time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
        `;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // typing simulation
    function showTypingAndRespond(questionText) {
        const typingWrapper = document.createElement('div');
        typingWrapper.className = 'msg bot-msg';
        typingWrapper.id = 'typingMsg';
        typingWrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesDiv.appendChild(typingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            const typingElem = document.getElementById('typingMsg');
            if (typingElem) typingElem.remove();
            
            const answer = getProblemDefinitionAnswer(questionText);
            addMessage(answer, false);
        }, 420);
    }
    
    function handleSend() {
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        
        addMessage(rawText, true);
        inputEl.value = '';
        
        showTypingAndRespond(rawText);
    }
    
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    inputEl.focus();
</script>
</body>
</html>
